<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="110" fill="#111111"/>

  <!-- Broom: handle → upper-right, bristles → lower-left (natural sweep) -->
  <g transform="translate(258, 260) rotate(35)">
    <!-- Handle -->
    <rect x="-8" y="-125" width="16" height="125" rx="8" fill="#ffffff"/>
    <!-- Collar -->
    <rect x="-30" y="0" width="60" height="12" rx="6" fill="#ffffff"/>
    <!-- Bristles — fan shape, longest in centre, shorter on edges -->
    <rect x="-48" y="12" width="16" height="55" rx="8" fill="#ffffff"/>
    <rect x="-28" y="12" width="16" height="67" rx="8" fill="#ffffff"/>
    <rect x="-8"  y="12" width="16" height="64" rx="8" fill="#ffffff"/>
    <rect x="12"  y="12" width="16" height="51" rx="8" fill="#ffffff"/>
    <rect x="32"  y="12" width="14" height="36" rx="7" fill="#ffffff"/>
  </g>

  <!-- Particles being swept away (lower-left) -->
  <circle cx="156" cy="318" r="15" fill="#ffffff" opacity="0.72"/>
  <circle cx="126" cy="356" r="10" fill="#ffffff" opacity="0.46"/>
  <circle cx="167" cy="378" r="7"  fill="#ffffff" opacity="0.28"/>
</svg>
